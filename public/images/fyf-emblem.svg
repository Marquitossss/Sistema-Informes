<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 300" width="256" height="300">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffed85"/>
      <stop offset="40%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#a07d25"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#143d7a"/>
      <stop offset="100%" stop-color="#0a2550"/>
    </linearGradient>
    <linearGradient id="tower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0a898"/>
      <stop offset="100%" stop-color="#7a7265"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8a6a20"/>
    </linearGradient>
  </defs>

  <!-- Shield shape: Spanish-style rounded bottom with point -->
  <path d="M128 8 L242 42 L242 128 Q242 202 128 248 Q14 202 14 128 L14 42 Z" fill="url(#blue)" stroke="url(#gold)" stroke-width="6"/>

  <!-- Inner border -->
  <path d="M128 22 L228 52 L228 126 Q228 194 128 236 Q28 194 28 126 L28 52 Z" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.4"/>

  <!-- Sun center -->
  <circle cx="128" cy="86" r="18" fill="url(#gold)"/>

  <!-- Sun face -->
  <circle cx="128" cy="86" r="12" fill="#a07d25" opacity="0.3"/>

  <!-- 12 rays, each with 3 sub-rays, through SVG rotation -->
  <g stroke="url(#gold)" stroke-width="2" stroke-linecap="round">
    <g transform="rotate(0 128 86)">
      <line x1="128" y1="68" x2="128" y2="52"/>
      <line x1="122" y1="68" x2="119" y2="54"/>
      <line x1="134" y1="68" x2="137" y2="54"/>
    </g>
    <g transform="rotate(30 128 86)">
      <line x1="128" y1="68" x2="128" y2="52"/>
      <line x1="122" y1="68" x2="119" y2="54"/>
      <line x1="134" y1="68" x2="137" y2="54"/>
    </g>
    <g transform="rotate(60 128 86)">
      <line x1="128" y1="68" x2="128" y2="52"/>
      <line x1="122" y1="68" x2="119" y2="54"/>
      <line x1="134" y1="68" x2="137" y2="54"/>
    </g>
    <g transform="rotate(90 128 86)">
      <line x1="128" y1="68" x2="128" y2="52"/>
      <line x1="122" y1="68" x2="119" y2="54"/>
      <line x1="134" y1="68" x2="137" y2="54"/>
    </g>
    <g transform="rotate(120 128 86)">
      <line x1="128" y1="68" x2="128" y2="52"/>
      <line x1="122" y1="68" x2="119" y2="54"/>
      <line x1="134" y1="68" x2="137" y2="54"/>
    </g>
    <g transform="rotate(150 128 86)">
      <line x1="128" y1="68" x2="128" y2="52"/>
      <line x1="122" y1="68" x2="119" y2="54"/>
      <line x1="134" y1="68" x2="137" y2="54"/>
    </g>
    <g transform="rotate(180 128 86)">
      <line x1="128" y1="68" x2="128" y2="52"/>
      <line x1="122" y1="68" x2="119" y2="54"/>
      <line x1="134" y1="68" x2="137" y2="54"/>
    </g>
    <g transform="rotate(210 128 86)">
      <line x1="128" y1="68" x2="128" y2="52"/>
      <line x1="122" y1="68" x2="119" y2="54"/>
      <line x1="134" y1="68" x2="137" y2="54"/>
    </g>
    <g transform="rotate(240 128 86)">
      <line x1="128" y1="68" x2="128" y2="52"/>
      <line x1="122" y1="68" x2="119" y2="54"/>
      <line x1="134" y1="68" x2="137" y2="54"/>
    </g>
    <g transform="rotate(270 128 86)">
      <line x1="128" y1="68" x2="128" y2="52"/>
      <line x1="122" y1="68" x2="119" y2="54"/>
      <line x1="134" y1="68" x2="137" y2="54"/>
    </g>
    <g transform="rotate(300 128 86)">
      <line x1="128" y1="68" x2="128" y2="52"/>
      <line x1="122" y1="68" x2="119" y2="54"/>
      <line x1="134" y1="68" x2="137" y2="54"/>
    </g>
    <g transform="rotate(330 128 86)">
      <line x1="128" y1="68" x2="128" y2="52"/>
      <line x1="122" y1="68" x2="119" y2="54"/>
      <line x1="134" y1="68" x2="137" y2="54"/>
    </g>
  </g>

  <!-- Watchtower (torre almenara) with battlements -->
  <g>
    <!-- Battlement top -->
    <rect x="98" y="117" width="8" height="7" fill="url(#tower)" stroke="#5a5248" stroke-width="1"/>
    <rect x="110" y="117" width="8" height="7" fill="url(#tower)" stroke="#5a5248" stroke-width="1"/>
    <rect x="122" y="117" width="8" height="7" fill="url(#tower)" stroke="#5a5248" stroke-width="1"/>
    <rect x="134" y="117" width="8" height="7" fill="url(#tower)" stroke="#5a5248" stroke-width="1"/>
    <rect x="146" y="117" width="8" height="7" fill="url(#tower)" stroke="#5a5248" stroke-width="1"/>
    <!-- Battlement gaps -->
    <rect x="106" y="117" width="4" height="7" fill="url(#blue)" stroke="none"/>
    <rect x="118" y="117" width="4" height="7" fill="url(#blue)" stroke="none"/>
    <rect x="130" y="117" width="4" height="7" fill="url(#blue)" stroke="none"/>
    <rect x="142" y="117" width="4" height="7" fill="url(#blue)" stroke="none"/>
    <!-- Tower body -->
    <rect x="98" y="122" width="56" height="46" fill="url(#tower)" stroke="#5a5248" stroke-width="1"/>
    <!-- Tower door (arched) -->
    <path d="M112 168 L112 150 Q126 142 140 150 L140 168 Z" fill="#0a2550" stroke="#5a5248" stroke-width="1"/>
    <!-- Tower window -->
    <rect x="122" y="130" width="8" height="10" fill="#0a2550" stroke="#5a5248" stroke-width="0.8" rx="1"/>
  </g>

  <!-- Ribbon / scroll behind lower text area -->
  <path d="M60 228 Q128 220 196 228 L196 250 Q128 258 60 250 Z" fill="url(#ribbon)" stroke="#8a6a20" stroke-width="1.5"/>
  <path d="M60 228 Q128 222 196 228" fill="none" stroke="#ffe066" stroke-width="0.8" opacity="0.6"/>

  <!-- FISCAL Y FRONTERAS on ribbon -->
  <text x="128" y="244" text-anchor="middle" fill="#ffffff" font-family="Georgia,serif" font-size="11" font-weight="bold" letter-spacing="1.5">FISCAL Y FRONTERAS</text>

  <!-- BORDER & CUSTOMS text below -->
  <text x="128" y="268" text-anchor="middle" fill="url(#gold)" font-family="Arial,sans-serif" font-size="8" font-weight="bold" letter-spacing="1">BORDER &amp; CUSTOMS POLICE</text>
</svg>
